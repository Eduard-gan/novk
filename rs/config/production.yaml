logger:
  enable: true
  pretty_backtrace: false
  level: info
  format: json

server:
  port: {{ get_env(name="PORT", default="5150") }}
  binding: {{ get_env(name="BINDING", default="127.0.0.1") }}
  host: https://{{ get_env(name="DOMAIN", default="novk.local") }}
  middlewares:
    cors:
      enable: true
      allow_origins:
        - https://{{ get_env(name="DOMAIN", default="novk.local") }}
      allow_methods:
        - GET
        - POST
        - OPTIONS
      allow_headers:
        - content-type
      allow_credentials: true
    static:
      enable: true
      must_exist: true
      precompressed: false
      folder:
        uri: "/static"
        path: "assets/static"
      fallback: "assets/static/404.html"

workers:
  mode: BackgroundAsync

database:
  uri: {{ get_env(name="DATABASE_URL", default="sqlite://novk.sqlite?mode=rwc") }}
  enable_logging: false
  connect_timeout: {{ get_env(name="DB_CONNECT_TIMEOUT", default="500") }}
  idle_timeout: {{ get_env(name="DB_IDLE_TIMEOUT", default="500") }}
  min_connections: {{ get_env(name="DB_MIN_CONNECTIONS", default="1") }}
  max_connections: {{ get_env(name="DB_MAX_CONNECTIONS", default="1") }}
  auto_migrate: true
  dangerously_truncate: false
  dangerously_recreate: false

auth:
  jwt:
    secret: {{ get_env(name="JWT_SECRET") }}
    expiration: 604800

settings:
  auth:
    cookie_name: auth
